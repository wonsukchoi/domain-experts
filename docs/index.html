  <p class="tagline">Crowdsourced job-role skills for AI agents — <span id="role-count"></span> roles and counting.</p>
  <p class="links">
    <a href="https://github.com/wonsukchoi/domain-experts">GitHub</a> ·
    <a href="https://www.npmjs.com/package/domain-experts">npm</a> ·
    <a href="https://github.com/wonsukchoi/domain-experts/blob/main/docs/FAQ.md">FAQ</a> ·
    <a href="https://github.com/wonsukchoi/domain-experts/blob/main/docs/CHANGELOG.md">Changelog</a> ·
    <a href="feed.xml">RSS</a>
  </p>
</header>

<main>
  <div class="controls">
    <input id="search" type="search" placeholder="Search roles (e.g. actuary, network, mathematician)…" autocomplete="off" aria-label="Search roles">
    <select id="category-filter" aria-label="Filter by category">
      <option value="">All categories</option>
    </select>
  </div>

  <p id="result-count" class="result-count"></p>
  <div id="role-list" class="role-list"></div>
</main>

<footer>
  <p>Install any role: <code>npx domain-experts add &lt;slug&gt;</code></p>
</footer>

<script src="app.js"></script>
</body>
</html>
